name: Weekly security scan

on:
  schedule:
    # Cron for every Monday at 12:00 UTC.
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  scan:
    strategy:
      fail-fast: false
      matrix:
        branch: [ backplane-2.11, backplane-2.17 ]
    name: Trivy (${{ matrix.branch }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Check out code
      uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # tag=v6.0.0
      with:
        ref: ${{ matrix.branch }}

    - name: Run Trivy vulnerability scanner in repo mode
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM,LOW'
        exit-code: '1'
      continue-on-error: true
      id: trivy-scan

    - name: Run Trivy for human-readable output
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        output: 'trivy-results.txt'
        severity: 'CRITICAL,HIGH,MEDIUM,LOW'
      continue-on-error: true

    - name: Generate summary
      if: always()
      run: |
        echo "# Trivy Security Scan Results (${{ matrix.branch }})" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Comprehensive security scan for vulnerabilities, misconfigurations, secrets, and dependencies." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ -f trivy-results.txt ]; then
          CRITICAL=$(grep -c "CRITICAL" trivy-results.txt 2>/dev/null) || true
          HIGH=$(grep -c "HIGH" trivy-results.txt 2>/dev/null) || true
          MEDIUM=$(grep -c "MEDIUM" trivy-results.txt 2>/dev/null) || true
          LOW=$(grep -c "LOW" trivy-results.txt 2>/dev/null) || true
          CRITICAL=${CRITICAL:-0}
          HIGH=${HIGH:-0}
          MEDIUM=${MEDIUM:-0}
          LOW=${LOW:-0}

          TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))

          if [ "$TOTAL" = "0" ]; then
            echo "## ✅ No vulnerabilities found!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Branch \`${{ matrix.branch }}\` passed all Trivy security checks." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Vulnerabilities detected: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟠 HIGH | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟡 MEDIUM | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟢 LOW | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Scan Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "⚠️ No results file generated" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Trivy results (SARIF)
      if: always()
      uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
      with:
        sarif_file: 'trivy-results.sarif'
        category: 'trivy-${{ matrix.branch }}'
      continue-on-error: true

    - name: Upload Trivy results (artifact)
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: trivy-results-${{ matrix.branch }}
        path: |
          trivy-results.sarif
          trivy-results.txt
        retention-days: 30

    - name: Create GitHub issue on vulnerability
      if: steps.trivy-scan.outcome == 'failure' && github.event_name != 'pull_request'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SERVER_URL: ${{ github.server_url }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        BRANCH: ${{ matrix.branch }}
        SHA: ${{ github.sha }}
      run: |
        EXISTING_ISSUE=$(gh issue list --state open --label "security" --label "trivy" --label "$BRANCH" --json number --jq ".[0].number" 2>/dev/null || echo "")

        CRITICAL=$(grep -o "CRITICAL" trivy-results.txt 2>/dev/null | wc -l || echo "0")
        HIGH=$(grep -o "HIGH" trivy-results.txt 2>/dev/null | wc -l || echo "0")
        MEDIUM=$(grep -o "MEDIUM" trivy-results.txt 2>/dev/null | wc -l || echo "0")
        LOW=$(grep -o "LOW" trivy-results.txt 2>/dev/null | wc -l || echo "0")
        TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))

        if [ -n "$EXISTING_ISSUE" ]; then
          echo "Existing issue found: #$EXISTING_ISSUE"

          {
            echo "## 🔄 Vulnerabilities Still Present"
            echo ""
            echo "**New Detection**: ${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
            echo "**Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "**Branch**: ${BRANCH}"
            echo ""
            echo "### Current Vulnerability Count"
            echo ""
            echo "| Severity | Count |"
            echo "|----------|-------|"
            echo "| 🔴 CRITICAL | $CRITICAL |"
            echo "| 🟠 HIGH | $HIGH |"
            echo "| 🟡 MEDIUM | $MEDIUM |"
            echo "| 🟢 LOW | $LOW |"
            echo "| **TOTAL** | **$TOTAL** |"
            echo ""
            echo "### Latest Scan Results"
            echo ""
            echo "<details>"
            echo "<summary>Click to expand Trivy scan output</summary>"
            echo ""
            echo '```'
            cat trivy-results.txt 2>/dev/null | head -200 || echo "See workflow logs for full details"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "**Security Tab**: Check the [Security tab](${SERVER_URL}/${REPO}/security/code-scanning) for detailed SARIF results."
          } > comment_body.md

          gh issue comment "$EXISTING_ISSUE" --body-file comment_body.md
        else
          echo "Creating new issue..."

          {
            echo "# 🚨 Security Alert: Vulnerabilities Detected (Trivy)"
            echo ""
            echo "## Overview"
            echo ""
            echo "The **Trivy** security scanner has detected vulnerabilities on branch \`${BRANCH}\`."
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Scanner** | Trivy |"
            echo "| **Branch** | \`${BRANCH}\` |"
            echo "| **🔴 CRITICAL** | $CRITICAL |"
            echo "| **🟠 HIGH** | $HIGH |"
            echo "| **🟡 MEDIUM** | $MEDIUM |"
            echo "| **🟢 LOW** | $LOW |"
            echo "| **TOTAL** | **$TOTAL** |"
            echo "| **Workflow Run** | [${RUN_ID}](${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}) |"
            echo "| **Date** | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |"
            echo ""
            echo "## 📋 Scan Results"
            echo ""
            echo "🔒 **SARIF Results**: [View in Security Tab](${SERVER_URL}/${REPO}/security/code-scanning)"
            echo ""
            echo "<details open>"
            echo "<summary><b>Trivy Findings</b></summary>"
            echo ""
            echo '```'
            cat trivy-results.txt 2>/dev/null || echo "See workflow run logs for complete details"
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "## 🔧 Remediation"
            echo ""
            echo "1. **Prioritize** by severity: CRITICAL → HIGH → MEDIUM → LOW"
            echo "2. **Update** vulnerable dependencies: \`go get -u <package>@<safe-version> && go mod tidy\`"
            echo "3. **Test** changes: \`make test\`"
            echo "4. **Verify** locally: \`docker run --rm -v \$(pwd):/scan aquasec/trivy fs /scan\`"
            echo ""
            echo "---"
            echo ""
            echo "*🤖 This issue was automatically created by the [security scan workflow](${SERVER_URL}/${REPO}/actions/workflows/weekly-security-scan.yaml)*"
          } > issue_body.md

          gh issue create \
            --title "🚨 [Trivy] $TOTAL vulnerabilities detected on ${BRANCH}" \
            --label "security" \
            --label "trivy" \
            --label "$BRANCH" \
            --body-file issue_body.md || \
          echo "Failed to create issue, but continuing workflow"
        fi

    - name: Fail if vulnerabilities found
      if: steps.trivy-scan.outcome == 'failure'
      run: exit 1
